# ===== 認証 =====
auth:
  method: "vertex_ai" # "api_key" | "vertex_ai" | "oauth"
  apiKey: ""
  vertexAi:
    project: "your-project-id"
    location: "us-central1"
  oauth:
    clientId: ""
    clientSecret: ""

# ===== 出力 =====
output:
  directory: ".google-genmedia-mcp/output"

# ===== GCS (Vertex AI 方式のみ) =====
# Veo 動画生成には enabled: true を推奨（output_gcs_uri として使用）
gcs:
  enabled: false
  bucket: "your-bucket-name"

# ===== サーバー =====
server:
  transport: "stdio"
  host: "127.0.0.1"
  port: 8000
  logLevel: "INFO"

# ===== プロンプト =====
prompt:
  prefix: ""        # 全プロンプトの先頭に付与するテキスト（例: "日本語で出力。"）
  separator: "\n"   # prefix とプロンプトの区切り文字

# ===== ツール設定 =====
tools:
  generateImage:
    aspectRatio: "16:9"
    numberOfImages: 1
    outputMimeType: "image/png"
    defaultModel: "Nano Banana 2"
    models:
      - id: "imagen-4.0-ultra-generate-001"
        aliases: ["Imagen 4 Ultra", "imagen-4.0-ultra"]
      - id: "imagen-4.0-generate-001"
        aliases: ["Imagen 4", "imagen-4.0"]
      - id: "imagen-4.0-fast-generate-001"
        aliases: ["Imagen 4 Fast", "imagen-4.0-fast"]
      - id: "gemini-3.1-flash-image-preview"
        aliases: ["Nano Banana 2", "gemini-3.1-flash-image"]
        global: true  # Vertex AI ではグローバルエンドポイントが必要
      - id: "gemini-3-pro-image-preview"
        aliases: ["Nano Banana Pro", "gemini-3-pro-image"]
        global: true  # Vertex AI ではグローバルエンドポイントが必要
      - id: "gemini-2.5-flash-image"
        aliases: ["Nano Banana", "gemini-2.5-flash-preview-image-generation"]

  editImage:
    editMode: "inpaint_insertion"
    numberOfImages: 1
    defaultModel: "Imagen 3"
    # 画像編集は Imagen 3 capability モデルのみ対応
    # Imagen 4 の generate モデルは編集 API 非対応
    models:
      - id: "imagen-3.0-capability-001"
        aliases: ["Imagen 3", "imagen-3.0"]

  generateVideo:
    aspectRatio: "16:9"
    durationSeconds: 8
    numberOfVideos: 1
    generateAudio: null  # null = モデルに応じて自動（Veo 3+ は True、Veo 2 は無効）
    defaultModel: "Veo 3.1"
    models:
      - id: "veo-3.1-generate-preview"
        aliases: ["Veo 3.1", "veo-3.1", "veo-3.1-generate-001"]
      - id: "veo-3.1-fast-generate-preview"
        aliases: ["Veo 3.1 Fast", "veo-3.1-fast", "veo-3.1-fast-generate-001"]
      - id: "veo-3.0-generate-preview"
        aliases: ["Veo 3", "veo-3.0"]
      - id: "veo-3.0-generate-001"
        aliases: ["veo-3.0-generate"]
      - id: "veo-3.0-fast-generate-preview"
        aliases: ["Veo 3 Fast", "veo-3.0-fast"]
      - id: "veo-3.0-fast-generate-001"
        aliases: ["veo-3.0-fast-generate"]
      - id: "veo-2.0-generate-001"
        aliases: ["Veo 2", "veo-2.0"]
      - id: "veo-2.0-generate-exp"
        aliases: ["Veo 2 Exp", "veo-2.0-exp"]
      - id: "veo-2.0-generate-preview"
        aliases: ["Veo 2 Preview", "veo-2.0-preview"]
    polling:
      pollInterval: 15
      pollTimeout: 600

  # generateVideo と同じ Veo モデルを使用（T2V / I2V でモデル・ポーリング設定を個別管理可能）
  generateVideoFromImage:
    aspectRatio: "16:9"
    durationSeconds: 8
    generateAudio: null  # null = モデルに応じて自動（Veo 3+ は True、Veo 2 は無効）
    defaultModel: "Veo 3.1"
    models:
      - id: "veo-3.1-generate-preview"
        aliases: ["Veo 3.1", "veo-3.1", "veo-3.1-generate-001"]
      - id: "veo-3.1-fast-generate-preview"
        aliases: ["Veo 3.1 Fast", "veo-3.1-fast", "veo-3.1-fast-generate-001"]
      - id: "veo-3.0-generate-preview"
        aliases: ["Veo 3", "veo-3.0"]
      - id: "veo-3.0-generate-001"
        aliases: ["veo-3.0-generate"]
      - id: "veo-3.0-fast-generate-preview"
        aliases: ["Veo 3 Fast", "veo-3.0-fast"]
      - id: "veo-3.0-fast-generate-001"
        aliases: ["veo-3.0-fast-generate"]
      - id: "veo-2.0-generate-001"
        aliases: ["Veo 2", "veo-2.0"]
      - id: "veo-2.0-generate-exp"
        aliases: ["Veo 2 Exp", "veo-2.0-exp"]
      - id: "veo-2.0-generate-preview"
        aliases: ["Veo 2 Preview", "veo-2.0-preview"]
    polling:
      pollInterval: 15
      pollTimeout: 600

  generateSpeech:
    audioEncoding: "mp3"
    defaultVoice: "Kore"
    defaultLanguage: "ja-JP"
    # Chirp ボイス一覧 (8 種)
    voices:
      - name: "Aoede"
        gender: "female"
      - name: "Kore"
        gender: "female"
      - name: "Leda"
        gender: "female"
      - name: "Zephyr"
        gender: "female"
      - name: "Puck"
        gender: "male"
      - name: "Charon"
        gender: "male"
      - name: "Fenrir"
        gender: "male"
      - name: "Orus"
        gender: "male"

  generateMusic:
    defaultModel: "Lyria 2"
    models:
      - id: "lyria-002"
        aliases: ["Lyria 2", "lyria2"]
